<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>پست‌ها | Amir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .soon-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 22px;
      }
      .soon-tag {
        font-family: var(--mono);
        font-size: 0.8rem;
        color: var(--accent);
        letter-spacing: 0.1em;
        margin-bottom: 18px;
      }
      .soon-wrap h1 {
        font-family: var(--display);
        font-size: clamp(2rem, 5vw, 3rem);
        margin-bottom: 16px;
      }
      .soon-wrap p {
        color: var(--ink-soft);
        max-width: 44ch;
        line-height: 1.9;
        margin-bottom: 32px;
      }
      .soon-back {
        font-family: var(--mono);
        font-size: 0.85rem;
        color: var(--ink);
        text-decoration: none;
        border: 1.5px solid var(--ink);
        padding: 12px 26px;
        border-radius: 8px;
        transition: 0.25s;
      }
      .soon-back:hover {
        background: var(--ink);
        color: var(--paper);
      }
    </style>
  </head>
  <body>
    <div class="crop tl"></div>
    <div class="crop tr"></div>
    <div class="crop bl"></div>
    <div class="crop br"></div>

    <div class="soon-wrap">
      <div class="soon-tag ltr">FIG. 06 — UNDER CONSTRUCTION</div>
      <h1>پست‌ها به‌زودی منتشر می‌شود</h1>
      <p>
        این بخش داره آماده می‌شه. به‌زودی پست‌های کوتاه‌تر و به‌روزرسانی‌های
        سریع‌تر اینجا قرار می‌گیرن.
      </p>
      <a href="../index.html" class="soon-back">بازگشت به صفحه اصلی</a>
    </div>
  </body>
</html>
